<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Analytics Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-body: #0b0e14;
            --bg-card: #141a24;
            --border-card: #1f293d;
            --text-primary: #ffffff;
            --text-secondary: #6c7d93;
            --neon-cyan: #00b4d8;
            --neon-yellow: #ffb703;
            --neon-green: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 30px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            grid-gap: 20px;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-card);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 26px;
            margin: 0;
            color: var(--text-primary);
            font-weight: 600;
        }

        .header .live-badge {
            background-color: rgba(42, 157, 143, 0.15);
            color: var(--neon-green);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(42, 157, 143, 0.3);
        }

        /* Card System */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-card);
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        /* Top Metrics Row */
        .main-stats-card {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 20px;
        }

        .metric-group .label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .metric-group .value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 5px;
        }

        #main-temp-val { color: var(--neon-cyan); }
        #feels-like-val { color: var(--neon-yellow); }
        #humidity-val { color: var(--neon-green); }

        /* Chart Workspace */
        .chart-card {
            grid-column: 1 / 2;
            height: 380px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 320px;
        }

        /* Sidebar Side-Widgets */
        .sidebar {
            grid-column: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .widget .big-num {
            font-size: 28px;
            font-weight: 600;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header">
            <h1 id="loc-title">Kuala Lumpur Analytics</h1>
            <div class="live-badge">● LIVE DATA</div>
        </div>

        <div class="card main-stats-card">
            <div class="metric-group">
                <div class="label">Current Temperature</div>
                <div class="value" id="main-temp-val">--°C</div>
            </div>
            <div class="metric-group">
                <div class="label">Apparent Feels Like</div>
                <div class="value" id="feels-like-val">--°C</div>
            </div>
            <div class="metric-group">
                <div class="label">Relative Humidity</div>
                <div class="value" id="humidity-val">--%</div>
            </div>
        </div>

        <div class="card chart-card">
            <div class="card-title">Temperature Evolution (Next 12 Hours)</div>
            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="sidebar">
            <div class="card widget">
                <div class="card-title">Wind Velocity</div>
                <div class="big-num" id="wind-val">-- km/h</div>
            </div>
            <div class="card widget">
                <div class="card-title">Precipitation</div>
                <div class="big-num" id="rain-val">-- mm</div>
            </div>
        </div>

    </div>

    <script>
        // Secure, HTTPS Open-Meteo endpoint returning matching parameters
        const endpoint = 'https://api.open-meteo.com/v1/forecast?latitude=3.1412&longitude=101.6865&hourly=temperature_2m&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,precipitation&timezone=Asia%2FSingapore';

        async function initDashboard() {
            try {
                const res = await fetch(endpoint);
                const apiData = await res.json();

                // Bind current values instantly to UI blocks
                const live = apiData.current;
                document.getElementById('main-temp-val').innerText = `${live.temperature_2m}°C`;
                document.getElementById('feels-like-val').innerText = `${live.apparent_temperature}°C`;
                document.getElementById('humidity-val').innerText = `${live.relative_humidity_2m}%`;
                document.getElementById('wind-val').innerText = `${live.wind_speed_10m} km/h`;
                document.getElementById('rain-val').innerText = `${live.precipitation} mm`;

                // Build timelines dynamically for Chart.js area plot
                const timeline = apiData.hourly.time.slice(0, 12).map(t => {
                    return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                });
                const tempCurve = apiData.hourly.temperature_2m.slice(0, 12);

                generateAreaChart(timeline, tempCurve);

            } catch (err) {
                console.error("Dashboard engine connection error:", err);
                document.getElementById('loc-title').innerText = "Terminal Offline";
            }
        }

        function generateAreaChart(xLabels, yData) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');

            // Generate neon chart gradients matching the crypto view layout
            const neonGlow = ctx.createLinearGradient(0, 0, 0, 300);
            neonGlow.addColorStop(0, 'rgba(0, 180, 216, 0.4)');
            neonGlow.addColorStop(1, 'rgba(0, 180, 216, 0.0)');

            new Chart(ctx, {
                type: 'line', // Shifted away from simple columns to sleek area line plots
                data: {
                    labels: xLabels,
                    datasets: [{
                        label: 'Temperature Trend',
                        data: yData,
                        borderColor: '#00b4d8',
                        borderWidth: 3,
                        backgroundColor: neonGlow,
                        fill: true, // Turns line chart into a filled area graph
                        tension: 0.4, // Creates smooth, aesthetic curved paths
                        pointRadius: 4,
                        pointBackgroundColor: '#00b4d8',
                        pointHoverRadius: 7,
                        pointHoverBackgroundColor: '#ffb703'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#6c7d93', font: { size: 11 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#6c7d93', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
