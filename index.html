<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Weather Dashboard v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-body: #0b0e14;
            --bg-card: #141a24;
            --border-card: #1f293d;
            --text-primary: #ffffff;
            --text-secondary: #6c7d93;
            --electric-blue: #00b4d8;
            --pop-yellow: #ffb703;
            --pop-green: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 20px;
            margin-top: 20px;
        }

        .dashboard-header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .dashboard-header h1 {
            color: var(--electric-blue);
            font-weight: 700;
            margin-bottom: 0;
            font-size: 36px;
        }

        .dashboard-header p {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 16px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-card);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
        }

        .main-chart-card {
            grid-column: 1 / 2;
            height: 450px;
        }

        .data-cards {
            grid-column: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .data-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .data-card h3 {
            color: var(--text-secondary);
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .data-card .value {
            font-size: 48px;
            font-weight: 700;
            margin: 10px 0;
        }

        .data-card .value sup {
            font-size: 24px;
        }

        .data-card.temp .value {
            color: var(--pop-yellow);
        }

        .data-card.humidity .value {
            color: var(--pop-green);
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
        }

        /* Weather Icon Styling */
        .weather-icon-wrapper {
            position: absolute;
            top: -30px;
            right: 0;
            width: 100px;
            height: 100px;
            opacity: 0.15;
            background-image: linear-gradient(135deg, rgba(255,183,3,1) 0%, rgba(0,0,0,0) 80%);
            border-radius: 50%;
            filter: blur(10px);
        }

        /* SVG Icon for Weather */
        .weather-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
        }

    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1 id="location">Kuala Lumpur Current Sky</h1>
        <p>Live Dashboard powered by Open-Meteo API v2.0</p>
    </div>

    <div class="dashboard-container">
        <div class="card main-chart-card">
            <h3>Hourly Weather Forecast</h3>
            <div class="chart-wrapper">
                <canvas id="weatherChart"></canvas>
            </div>
        </div>

        <div class="data-cards">
            <div class="card data-card temp">
                <div class="weather-icon-wrapper"></div>
                <svg class="weather-icon" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="#FFB703" opacity="0.8"/>
                    <path d="M50 20 L50 80 M20 50 L80 50 M29 29 L71 71 M29 71 L71 29" stroke="white" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <h3>Temperature Breakdown</h3>
                <div class="value" id="mainTemp">32<sup>°C</sup></div>
                <p>Feels Like: <span id="feelsLike">34</span>°C</p>
            </div>

            <div class="card data-card humidity">
                <h3>Current Humidity</h3>
                <div class="value" id="humidity">78<sup>%</sup></div>
                <p>Air Saturation</p>
            </div>
        </div>
    </div>

    <script>
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=3.1412&longitude=101.6865&hourly=temperature_2m,relative_humidity_2m&current=temperature_2m,relative_humidity_2m,apparent_temperature&timezone=Asia%2FSingapore';

        async function fetchWeatherData() {
            try {
                const response = await fetch(url);
                const data = await response.json();

                // 1. Update Current Conditions Cards
                const current = data.current;
                document.getElementById('mainTemp').innerHTML = `${current.temperature_2m}<sup>°C</sup>`;
                document.getElementById('feelsLike').innerText = current.apparent_temperature;
                document.getElementById('humidity').innerHTML = `${current.relative_humidity_2m}<sup>%</sup>`;

                // 2. Prepare Hourly Forecast Chart Data (Next 12 Hours)
                const hourly = data.hourly;
                const next12Hours = hourly.time.slice(0, 12).map(timeStr => {
                    const date = new Date(timeStr);
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                });
                const next12Temps = hourly.temperature_2m.slice(0, 12);

                // 3. Render the dynamic Hourly Forecast Chart
                buildHourlyChart(next12Hours, next12Temps);

            } catch (error) {
                console.error("Failed to load dashboard data:", error);
                document.getElementById('location').innerText = "Load Failed";
            }
        }

        function buildHourlyChart(labels, tempData) {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            
            // Create a gradient for the bar fills
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#00b4d8');
            gradient.addColorStop(1, 'rgba(0,180,216, 0.1)');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Hourly Temp (°C)',
                        data: tempData,
                        backgroundColor: gradient,
                        borderColor: '#00b4d8',
                        borderWidth: 2,
                        borderRadius: 8,
                        hoverBackgroundColor: '#ffb703'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#141a24',
                            titleColor: '#ffffff',
                            bodyColor: '#6c7d93',
                            borderColor: '#1f293d',
                            borderWidth: 1,
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#6c7d93', font: { size: 12 } },
                            title: { display: true, text: 'Temp °C', color: '#6c7d93' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#6c7d93', font: { size: 10 } }
                        }
                    },
                    animation: {
                        duration: 1500,
                        easing: 'easeOutBounce'
                    }
                }
            });
        }

        // Initialize fetch on page load
        fetchWeatherData();
    </script>
</body>
</html>
