<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cuaca - Chart.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-box {
            width: 100%;
            max-width: 800px;
            background-color: #141a24;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f293d;
        }
        h1 { font-size: 24px; color: #00b4d8; margin-bottom: 5px; }
        p.subtitle { color: #6c7d93; margin-top: 0; margin-bottom: 30px; font-size: 14px; }
        .chart-wrapper { position: relative; width: 100%; height: 350px; }
    </style>
</head>
<body>
    <div class="dashboard-box">
        <h1>Dashboard Ramalan Cuaca</h1>
        <p class="subtitle">Data Mingguan Kuala Lumpur • Powered by Chart.js</p>
        <div class="chart-wrapper">
            <canvas id="grafCuaca"></canvas>
        </div>
    </div>
    <script>
        const senaraiHari = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu', 'Ahad'];
        const bacaanSuhu = [31, 33, 32, 34, 30, 29, 32];
        const ctx = document.getElementById('grafCuaca').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: senaraiHari,
                datasets: [{
                    label: 'Suhu Maksimum (°C)',
                    data: bacaanSuhu,
                    borderColor: '#00b4d8',
                    backgroundColor: 'rgba(0, 180, 216, 0.15)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#00b4d8'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    y: { grid: { color: '#1f293d' }, ticks: { color: '#6c7d93' }, beginAtZero: false },
                    x: { grid: { color: 'transparent' }, ticks: { color: '#6c7d93' } }
                }
            }
        });
    </script>
</body>
</html>
