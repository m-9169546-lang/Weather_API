<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Chart.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-box {
            width: 100%;
            max-width: 600px;
            background-color: #141a24;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #1f293d;
        }
        h1 { color: #00b4d8; margin-bottom: 5px; }
        p { color: #6c7d93; margin-top: 0; }
        .chart-wrapper { position: relative; width: 100%; height: 300px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-box">
        <h1 id="location">Fetching Live Data...</h1>
        <p>Real-time Weather Dashboard via Open-Meteo API</p>
        
        <div class="chart-wrapper">
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <script>
        // Open-Meteo API URL (No API key required & uses HTTPS)
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=3.1412&longitude=101.6865&current=temperature_2m,relative_humidity_2m,apparent_temperature&timezone=Asia%2FSingapore';

        async function fetchWeatherData() {
            try {
                const response = await fetch(url);
                const data = await response.json();

                // Extracting live data points from API
                const currentTemp = data.current.temperature_2m;
                const feelsLike = data.current.apparent_temperature;
                const humidity = data.current.relative_humidity_2m;

                // Update Heading text
                document.getElementById('location').innerText = `Weather in Kuala Lumpur`;

                // Render the Chart.js graph using live data
                buildChart(currentTemp, feelsLike, humidity);

            } catch (error) {
                document.getElementById('location').innerText = "Failed to Load Data";
                console.error("Error fetching data:", error);
            }
        }

        function buildChart(temp, feels, humid) {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Actual Temp (°C)', 'Feels Like (°C)', 'Humidity (%)'],
                    datasets: [{
                        label: 'Current Status',
                        data: [temp, feels, humid],
                        backgroundColor: ['#00b4d8', '#ffb703', '#2a9d8f'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1f293d' }, ticks: { color: '#6c7d93' } },
                        x: { ticks: { color: '#6c7d93' } }
                    }
                }
            });
        }

        // Initialize fetch on page load
        fetchWeatherData();
    </script>
</body>
</html>
