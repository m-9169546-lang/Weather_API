<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cuaca Saya</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121620; /* Tukar jadi dark mode terus bagi gempak! */
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: #1a202c;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #errorMessage {
            color: #f87171;
            font-weight: bold;
            margin-top: 20px;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 40vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard Ramalan Suhu Mingguan (Kuala Lumpur)</h1>
        
        <div id="errorMessage"></div>
        
        <div class="chart-container">
            <canvas id="weatherChart"></canvas>
        </div>
    </div>

    <script>
        // Guna Open-Meteo API (Tanpa perlukan API Key)
        const apiUrl = 'https://api.open-meteo.com/v1/forecast?latitude=3.1412&longitude=101.6865&daily=temperature_2m_max&timezone=Asia%2FSingapore';

        async function fetchWeatherData() {
            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('Gagal sambung ke API. Status: ' + response.status);
                }

                const data = await response.json();
                
                if (!data.daily || !data.daily.time) {
                    throw new Error('Data API tidak lengkap atau salah format.');
                }

                const labels = data.daily.time; 
                const temperatures = data.daily.temperature_2m_max; 

                renderChart(labels, temperatures);
            } catch (error) {
                // Paparkan error kat skrin kalau ada masalah
                document.getElementById('errorMessage').innerText = '❌ Alamak! Sesuatu yang salah berlaku: ' + error.message;
                console.error(error);
            }
        }

        function renderChart(dates, temps) {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Suhu Maksimum (°C)',
                        data: temps,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#ffffff' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#ffffff' },
                            beginAtZero: false
                        },
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#ffffff' }
                        }
                    }
                }
            });
        }

        // Jalankan function
        fetchWeatherData();
    </script>
</body>
</html>
