<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-body: #060814;
            --bg-card: #0e1326;
            --border-glow: #1a2342;
            --text-main: #ffffff;
            --text-muted: #6272a4;
            --neon-blue: #00b4d8;
            --neon-pink: #ff79c6;
            --neon-green: #50fa7b;
            --neon-yellow: #f1fa8c;
            --neon-purple: #bd93f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-grid {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 20px;
        }

        /* Top Header Area */
        .dashboard-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-glow);
            margin-bottom: 10px;
        }

        .dashboard-header h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .live-status {
            background: rgba(80, 250, 123, 0.1);
            color: var(--neon-green);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(80, 250, 123, 0.3);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Card Master Layout */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-weight: 700;
            margin: 0 0 15px 0;
            border-left: 3px solid var(--neon-blue);
            padding-left: 10px;
        }

        /* Dynamic Grid Sizes based on importance */
        .large-card { grid-column: 1 / 3; height: 380px; } 
        .small-card { grid-column: 3 / 4; height: 380px; } 
        .medium-card { grid-column: span 1; height: 340px; }

        .chart-frame {
            position: relative;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        
        <div class="dashboard-header">
            <h1>KUALA LUMPUR WEATHER METRIC STATION</h1>
            <div class="status-container">
                <div class="live-status" id="engine-status">● CORE TELEMETRY ONLINE</div>
                <div class="timestamp" id="last-update">Last Sync: Fetching...</div>
            </div>
        </div>

        <div class="card large-card">
            <div class="card-title">Temperature Evolution (12-Hour Spline Curve)</div>
            <div class="chart-frame">
                <canvas id="areaChartCanvas"></canvas>
            </div>
        </div>

        <div class="card small-card">
            <div class="card-title">Atmospheric Saturation (Humidity Share)</div>
            <div class="chart-frame">
                <canvas id="doughnutChartCanvas"></canvas>
            </div>
        </div>

        <div class="card medium-card">
            <div class="card-title">Rain & Precipitation Vectors</div>
            <div class="chart-frame">
                <canvas id="barChartCanvas"></canvas>
            </div>
        </div>

        <div class="card medium-card">
            <div class="card-title">Weather Element Coefficients</div>
            <div class="chart-frame">
                <canvas id="polarChartCanvas"></canvas>
            </div>
        </div>

        <div class="card medium-card">
            <div class="card-title">Wind Displacement Vector</div>
            <div class="chart-frame">
                <canvas id="lineChartCanvas"></canvas>
            </div>
        </div>

    </div>

    <script>
        const endpoint = 'https://api.open-meteo.com/v1/forecast?latitude=3.1412&longitude=101.6865&hourly=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,cloud_cover&timezone=Asia%2FSingapore';

        let activeCharts = {};

        async function triggerDashboardEngine() {
            try {
                // Tunjuk kesan visual hantar data tengah sync
                const statusBadge = document.getElementById('engine-status');
                statusBadge.innerText = "🔄 SYNCING LIVE TELEMETRY...";
                statusBadge.style.color = "var(--neon-yellow)";
                statusBadge.style.background = "rgba(241, 250, 140, 0.1)";
                statusBadge.style.borderColor = "rgba(241, 250, 140, 0.3)";

                const res = await fetch(endpoint);
                const data = await res.json();

                // Format X-axis ikutan komen Sir
                const hourlyTimeline = data.hourly.time.slice(0, 12).map(t => {
                    const dateObj = new Date(t);
                    const day = dateObj.toLocaleDateString([], { day: 'numeric', month: 'short' });
                    const time = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    return `${day}, ${time}`;
                });

                const tempDataStream = data.hourly.temperature_2m.slice(0, 12);
                const rainDataStream = data.hourly.precipitation.slice(0, 12);
                const windDataStream = data.hourly.wind_speed_10m.slice(0, 12);
                const live = data.current;

                // Render / Update semua charts
                initAreaChart(hourlyTimeline, tempDataStream);
                initDoughnutChart(live.relative_humidity_2m);
                initBarChart(hourlyTimeline, rainDataStream);
                initPolarChart(live.temperature_2m, live.relative_humidity_2m, live.cloud_cover, live.wind_speed_10m, live.precipitation);
                initLineChart(hourlyTimeline, windDataStream);

                // Update teks masa bila data ditarik masuk secara tepat (Jam:Minit:Saat)
                const kini = new Date();
                const masaString = kini.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                document.getElementById('last-update').innerText = `Last Sync: ${masaString} (Auto-updates every 30s)`;

                // Kembalikan ke warna hijau menandakan proses fetch selesai
                statusBadge.innerText = "● CORE TELEMETRY ONLINE";
                statusBadge.style.color = "var(--neon-green)";
                statusBadge.style.background = "rgba(80, 250, 123, 0.1)";
                statusBadge.style.borderColor = "rgba(80, 250, 123, 0.3)";

            } catch (error) {
                console.error("Critical Fault:", error);
                document.getElementById('engine-status').innerText = "● ENGINE OFFLINE (FAULT)";
                document.getElementById('engine-status').style.color = "red";
            }
        }

        function safeDestroy(chartKey) {
            if (activeCharts[chartKey]) { activeCharts[chartKey].destroy(); }
        }

        function initAreaChart(labels, values) {
            const ctx = document.getElementById('areaChartCanvas').getContext('2d');
            const glow = ctx.createLinearGradient(0, 0, 0, 300);
            glow.addColorStop(0, 'rgba(0, 180, 216, 0.4)');
            glow.addColorStop(1, 'rgba(0, 0, 0, 0)');

            safeDestroy('area');
            activeCharts['area'] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: '#00b4d8',
                        borderWidth: 3,
                        backgroundColor: glow,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6272a4' } }, x: { grid: { display: false }, ticks: { color: '#6272a4', font: { size: 9 } } } } }
            });
        }

        function initDoughnutChart(humidityValue) {
            const ctx = document.getElementById('doughnutChartCanvas').getContext('2d');
            safeDestroy('doughnut');
            activeCharts['doughnut'] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Moisture (Humidity)', 'Dry Air'],
                    datasets: [{
                        data: [humidityValue, 100 - humidityValue],
                        backgroundColor: ['#bd93f9', '#1a2342'],
                        borderWidth: 0,
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#ffffff', font: { size: 11 } } } }, cutout: '75%' }
            });
        }

        function initBarChart(labels, values) {
            const ctx = document.getElementById('barChartCanvas').getContext('2d');
            safeDestroy('bar');
            activeCharts['bar'] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: '#ff79c6',
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6272a4' } }, x: { ticks: { color: '#6272a4', font: { size: 8 } } } } }
            });
        }

        function initPolarChart(temp, humidity, cloud, wind, rain) {
            const ctx = document.getElementById('polarChartCanvas').getContext('2d');
            safeDestroy('polar');
            activeCharts['polar'] = new Chart(ctx, {
                type: 'polarArea',
                data: {
                    labels: ['Temp', 'Humidity', 'Clouds', 'Wind', 'Rain'],
                    datasets: [{
                        data: [temp, humidity, cloud, wind, rain * 10], 
                        backgroundColor: ['#50fa7b', '#bd93f9', '#ffb86c', '#ff5555', '#ff79c6'],
                        borderColor: '#0e1326',
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } } } }
            });
        }

        function initLineChart(labels, values) {
            const ctx = document.getElementById('lineChartCanvas').getContext('2d');
            safeDestroy('line');
            activeCharts['line'] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: '#f1fa8c',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6272a4' } }, x: { ticks: { color: '#6272a4', font: { size: 8 } } } } }
            });
        }

        // Jalankan kali pertama sewaktu page diload
        triggerDashboardEngine();

        // Ditukar ke 30 saat (30000ms) supaya perubahan status "Syncing" tu lebih cepat nampak!
        setInterval(triggerDashboardEngine, 30000);
    </script>
</body>
</html>
